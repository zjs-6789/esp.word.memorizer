<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基西默写器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 24px;
            font-weight: 500;
            font-size: 28px;
        }
        .selector {
            margin-bottom: 20px;
        }
        .selector label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #34495e;
        }
        select, .book-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            background: white;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 15px;
        }
        select:focus {
            border-color: #3498db;
        }
        .mode {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: center;
        }
        .mode label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #2c3e50;
        }
        .mode input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 20px;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .quiz-area {
            background: #f8fafc;
            border-radius: 24px;
            padding: 24px;
            margin-top: 10px;
        }
        .chinese {
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            color: #2c3e50;
            margin: 20px 0;
            min-height: 70px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #3498db;
        }
        .feedback {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            min-height: 30px;
            margin: 10px 0;
        }
        .progress {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-top: 16px;
        }
        .footer-note {
            text-align: center;
            color: #95a5a6;
            font-size: 14px;
            margin-top: 20px;
        }
        .small-hint {
            color: #7f8c8d;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }
        .show-answer-btn, .back-btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
            width: 100%;
        }
        .back-btn {
            background: #2ecc71;
            margin-top: 5px;
        }
        .back-btn:hover {
            background: #27ae60;
        }
        .show-answer-btn:hover {
            background: #e67e22;
        }
        .show-answer-btn:active, .back-btn:active {
            transform: scale(0.98);
        }
        .show-answer-btn:disabled, .back-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 基西默写器</h1>

        <!-- 选择区域：先选书，再选单元 -->
        <div class="selector">
            <label for="bookSelect">选择书本</label>
            <select id="bookSelect" class="book-select">
                <option value="">-- 请先选择书本 --</option>
            </select>

            <label for="unitSelect">选择单元（按住 Ctrl 多选）</label>
            <select id="unitSelect" multiple size="4">
                <!-- 选项会根据所选书本动态生成 -->
            </select>
        </div>

        <!-- 模式切换 -->
        <div class="mode">
            <label>
                <input type="radio" name="mode" value="order" checked> 顺序
            </label>
            <label>
                <input type="radio" name="mode" value="random"> 随机
            </label>
        </div>

        <!-- 开始按钮 -->
        <button class="btn" id="startBtn" disabled>加载单词中...</button>

        <!-- 默写区域（初始隐藏） -->
        <div class="quiz-area" id="quizArea" style="display: none;">
            <div class="chinese" id="chineseDisplay"></div>
            <div class="input-group">
                <input type="text" id="answerInput" placeholder="输入西班牙语后按回车" autocomplete="off">
            </div>
            <button class="show-answer-btn" id="showAnswerBtn">🔍 显示答案</button>
            <button class="back-btn" id="backBtn">↩️ 返回上一个</button>
            <div class="feedback" id="feedback"></div>
            <div class="progress" id="progress"></div>
            <div class="small-hint">✅ 正确后需再次按回车进入下一个<br>⏎ 空输入直接跳过当前<br>🔍 点击按钮或按 F2 显示答案<br>🔙 点击按钮或按 Alt+← 返回上一个</div>
        </div>

        <div class="footer-note">
            ⚡ 来自zju.esp.zjs
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let words = [];                 // 从 JSON 加载的原始单词数组
        let books = [];                 // 所有不重复的书本列表（如 "book1", "book2"）
        let currentWordList = [];       // 当前筛选出的单词池
        let currentIndex = 0;           // 当前单词在 currentWordList 中的索引（顺序模式）或在 remainingIndices 中的索引（随机模式）
        let remainingIndices = [];       // 随机模式下的剩余索引数组（随机顺序的单词索引）
        let isAnsweredCorrect = false;   // 当前单词是否已经答对
        let mode = 'order';              // 'order' 或 'random'

        // 获取 DOM 元素
        const bookSelect = document.getElementById('bookSelect');
        const unitSelect = document.getElementById('unitSelect');
        const modeRadios = document.getElementsByName('mode');
        const startBtn = document.getElementById('startBtn');
        const quizArea = document.getElementById('quizArea');
        const chineseDisplay = document.getElementById('chineseDisplay');
        const answerInput = document.getElementById('answerInput');
        const feedbackDiv = document.getElementById('feedback');
        const progressDiv = document.getElementById('progress');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const backBtn = document.getElementById('backBtn');

        // ---------- 辅助函数：从 unit 字段解析书本和单元 ----------
        function parseBookUnit(unitStr) {
            // 假设格式为 "bookX-unitY" 或类似，例如 "book1-unit1"
            const parts = unitStr.split('-');
            if (parts.length >= 2) {
                return { book: parts[0], unit: parts[1] };
            } else {
                // 兼容旧数据：如果没有连字符，整个作为 unit，book 设为 "unknown"
                return { book: 'unknown', unit: unitStr };
            }
        }

        // ---------- 加载外部 JSON 单词数据 ----------
        async function loadWords() {
            try {
                const response = await fetch('words.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                words = await response.json();
                console.log(`加载了 ${words.length} 个单词`);

                // 提取所有不重复的书本
                const bookSet = new Set();
                words.forEach(w => {
                    const { book } = parseBookUnit(w.unit);
                    bookSet.add(book);
                });
                books = Array.from(bookSet).sort();

                // 填充书本下拉框
                bookSelect.innerHTML = '<option value="">-- 请选择书本 --</option>';
                books.forEach(book => {
                    const option = document.createElement('option');
                    option.value = book;
                    // 可以美化显示，比如将 "book1" 显示为 "第一册"
                    let displayName = book;
                    if (book.startsWith('book')) {
                        const num = book.replace('book', '');
                        displayName = `第 ${num} 册`;
                    }
                    option.textContent = displayName;
                    bookSelect.appendChild(option);
                });

                // 书本选择变化时，更新单元列表
                bookSelect.addEventListener('change', updateUnitOptions);

                // 启用开始按钮（但需要用户先选书）
                startBtn.disabled = false;
                startBtn.textContent = '开始默写';
            } catch (error) {
                console.error('加载单词失败：', error);
                startBtn.textContent = '加载失败，刷新重试';
                startBtn.disabled = true;
            }
        }

        // 根据所选书本更新单元多选框
        function updateUnitOptions() {
            const selectedBook = bookSelect.value;
            if (!selectedBook) {
                unitSelect.innerHTML = '<option value="">-- 请先选择书本 --</option>';
                return;
            }

            // 从所有单词中过滤出属于该书本的单词，提取不重复的单元
            const unitSet = new Set();
            words.forEach(w => {
                const { book, unit } = parseBookUnit(w.unit);
                if (book === selectedBook) {
                    unitSet.add(unit);
                }
            });
            const units = Array.from(unitSet).sort();

            // 填充单元多选框
            unitSelect.innerHTML = '';
            units.forEach(unit => {
                const option = document.createElement('option');
                option.value = `${selectedBook}-${unit}`; // 存储完整标识，方便过滤
                // 美化显示
                let displayUnit = unit;
                if (unit.startsWith('unit')) {
                    const num = unit.replace('unit', '');
                    displayUnit = `第 ${num} 单元`;
                }
                option.textContent = displayUnit;
                unitSelect.appendChild(option);
            });
        }

        // 开始加载
        loadWords();

        // ---------- 监听模式变化 ----------
        modeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                mode = e.target.value;
            });
        });

        // ---------- 开始按钮点击 ----------
        startBtn.addEventListener('click', () => {
            if (words.length === 0) {
                alert('单词数据尚未加载，请稍后');
                return;
            }

            // 获取选中的单元（值是完整标识如 "book1-unit1"）
            const selectedOptions = Array.from(unitSelect.selectedOptions);
            if (selectedOptions.length === 0) {
                alert('请至少选择一个单元');
                return;
            }
            const selectedUnitIds = selectedOptions.map(opt => opt.value);

            // 根据选中的单元标识过滤单词
            currentWordList = words.filter(w => selectedUnitIds.includes(w.unit));
            if (currentWordList.length === 0) {
                alert('所选单元没有单词');
                return;
            }

            // 初始化索引
            if (mode === 'order') {
                currentIndex = 0;
                remainingIndices = []; // 随机模式下才使用
            } else {
                // 随机模式：生成一个打乱的索引数组
                remainingIndices = shuffleArray([...Array(currentWordList.length).keys()]);
                currentIndex = 0;
            }
            isAnsweredCorrect = false;

            // 显示默写区域
            quizArea.style.display = 'block';
            answerInput.disabled = false;
            showAnswerBtn.disabled = false;
            backBtn.disabled = false; // 启用返回按钮
            answerInput.focus();
            feedbackDiv.textContent = '';
            showCurrentWord();
        });

        // 显示当前单词的中文
        function showCurrentWord() {
            let wordObj;
            if (mode === 'order') {
                wordObj = currentWordList[currentIndex];
                progressDiv.textContent = `第 ${currentIndex+1} / ${currentWordList.length}`;
            } else {
                const realIndex = remainingIndices[currentIndex];
                wordObj = currentWordList[realIndex];
                progressDiv.textContent = `第 ${currentIndex+1} / ${remainingIndices.length}`;
            }
            chineseDisplay.textContent = wordObj.meaning;
        }

        // 进入下一个单词
        function moveToNextWord() {
            if (mode === 'order') {
                if (currentIndex < currentWordList.length - 1) {
                    currentIndex++;
                    isAnsweredCorrect = false;
                    showCurrentWord();
                } else {
                    // 全部完成
                    chineseDisplay.textContent = '🎉 恭喜！所有单词默写完毕！';
                    answerInput.disabled = true;
                    showAnswerBtn.disabled = true;
                    backBtn.disabled = true; // 禁用返回按钮
                    progressDiv.textContent = `已完成 ${currentWordList.length} 个单词`;
                }
            } else {
                if (currentIndex < remainingIndices.length - 1) {
                    currentIndex++;
                    isAnsweredCorrect = false;
                    showCurrentWord();
                } else {
                    chineseDisplay.textContent = '🎉 恭喜！所有单词默写完毕！';
                    answerInput.disabled = true;
                    showAnswerBtn.disabled = true;
                    backBtn.disabled = true;
                    progressDiv.textContent = `已完成 ${remainingIndices.length} 个单词`;
                }
            }
            answerInput.value = '';
            feedbackDiv.textContent = '';
        }

        // 返回上一个单词
        function goBack() {
            // 如果已经完成或没有单词，或已经在第一个单词，则无法返回
            if (currentWordList.length === 0 || answerInput.disabled) return;
            if (currentIndex <= 0) {
                alert('已经是第一个单词了');
                return;
            }
            currentIndex--;
            isAnsweredCorrect = false; // 重置为未答对
            answerInput.value = '';
            feedbackDiv.textContent = '';
            showCurrentWord();
            answerInput.focus();
        }

        // 显示答案的函数
        function showAnswer() {
            if (currentWordList.length === 0 || answerInput.disabled) return;
            let wordObj;
            if (mode === 'order') {
                wordObj = currentWordList[currentIndex];
            } else {
                const realIndex = remainingIndices[currentIndex];
                wordObj = currentWordList[realIndex];
            }
            feedbackDiv.textContent = `🔍 答案：${wordObj.es}`;
            feedbackDiv.style.color = 'blue';
            answerInput.focus();
        }

        showAnswerBtn.addEventListener('click', showAnswer);
        backBtn.addEventListener('click', goBack);

        // 处理键盘事件
        answerInput.addEventListener('keydown', (e) => {
            // Alt + ← 返回上一个
            if (e.altKey && e.key === 'ArrowLeft') {
                e.preventDefault(); // 阻止浏览器默认后退行为
                goBack();
                return;
            }

            if (e.key === 'F2') {
                e.preventDefault();
                showAnswer();
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();

                if (isAnsweredCorrect) {
                    moveToNextWord();
                    return;
                }

                const userAnswer = answerInput.value.trim();

                if (userAnswer === '') {
                    moveToNextWord();
                    return;
                }

                let wordObj;
                if (mode === 'order') {
                    wordObj = currentWordList[currentIndex];
                } else {
                    const realIndex = remainingIndices[currentIndex];
                    wordObj = currentWordList[realIndex];
                }

                if (userAnswer.toLowerCase() === wordObj.es.toLowerCase()) {
                    feedbackDiv.textContent = '✅ 正确！';
                    feedbackDiv.style.color = 'green';
                    isAnsweredCorrect = true;
                } else {
                    feedbackDiv.textContent = '❌ 错误，再试试';
                    feedbackDiv.style.color = 'red';
                }
            }
        });

        // 辅助：打乱数组
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
    </script>
</body>
</html>
